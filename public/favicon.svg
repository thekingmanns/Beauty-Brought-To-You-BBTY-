<svg viewBox="0 0 512 512" width="512" height="512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Vibrant diagonal pink-to-blue gradient matching the brand image -->
    <linearGradient id="app-icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff00cc" />   <!-- Neon Fuchsia/Pink -->
      <stop offset="45%" stop-color="#9d2eff" />  <!-- Vibrant Violet Purple -->
      <stop offset="100%" stop-color="#00a8ff" /> <!-- Electric Cyan Blue -->
    </linearGradient>

    <!-- Drop shadow for the white silhouette elements to make them pop -->
    <filter id="logo-drop-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#5c10ab" flood-opacity="0.35" />
    </filter>

    <!-- Starburst motif used in scissor handle centers -->
    <g id="sparkle-star">
      <circle cx="0" cy="0" r="3" fill="#ffffff" />
      <polygon points="0,-18 2.5,-5 18,0 2.5,5 0,18 -2.5,5 -18,0 -2.5,-5" fill="#ffffff" />
      <polygon points="0,-10 1.2,-2.5 10,0 1.2,2.5 0,10 -1.2,2.5 -10,0 -1.2,-2.5" fill="#ffffff" opacity="0.7" transform="rotate(45)" />
    </g>

    <!-- Smaller decorative background sparkle -->
    <g id="bg-sparkle">
      <polygon points="0,-8 1.5,-2 8,0 1.5,2 0,8 -1.5,2 -8,0 -1.5,-2" fill="#ffffff" opacity="0.8" />
    </g>
  </defs>

  <!-- 1. Rounded Square Background Card -->
  <rect x="20" y="20" width="472" height="472" rx="104" fill="url(#app-icon-grad)" />

  <!-- 2. Glassmorphic 3D Sheen Highlights (Top-Left and Bottom-Right) -->
  <path d="M 50,140 C 50,90 90,50 140,50" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.25" />
  <path d="M 372,462 C 422,462 462,422 462,372" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" fill="none" opacity="0.15" />

  <!-- Decorative sparkles in corners -->
  <use href="#bg-sparkle" x="65" y="150" />
  <use href="#bg-sparkle" x="445" y="375" />

  <!-- Group of all white logo silhouettes with a premium drop shadow -->
  <g filter="url(#logo-drop-shadow)">
    
    <!-- 3. Arched Road / Highway -->
    <!-- Base smooth road line -->
    <path d="M 60,380 Q 256,312 452,380 L 452,398 Q 256,330 60,398 Z" fill="#ffffff" />
    <!-- Dashed lane markings (cutouts/negative space represented by small overlay paths) -->
    <path d="M 85,385 Q 256,321 427,385" stroke="url(#app-icon-grad)" stroke-width="3" stroke-dasharray="12,12" fill="none" />

    <!-- 4. Cozy House Element on the right sitting on the road -->
    <g transform="translate(10, 5)">
      <!-- House outline -->
      <path d="M 315,365 L 315,285 L 305,285 L 365,232 L 425,285 L 415,285 L 415,365 Z" fill="#ffffff" />
      
      <!-- Arched door cutout -->
      <path d="M 353,365 L 353,322 Q 365,308 377,322 L 377,365 Z" fill="url(#app-icon-grad)" />
      
      <!-- 4-Pane Square window -->
      <rect x="353" y="278" width="24" height="24" rx="2" fill="url(#app-icon-grad)" />
      <!-- Window pane dividers -->
      <line x1="365" y1="278" x2="365" y2="302" stroke="#ffffff" stroke-width="1.8" />
      <line x1="353" y1="290" x2="377" y2="290" stroke="#ffffff" stroke-width="1.8" />
    </g>

    <!-- 5. Scissors Mascot in the center -->
    <g>
      <!-- Rings (Handles) as bold circular outlines -->
      <circle cx="185" cy="275" r="38" stroke="#ffffff" stroke-width="9" fill="none" />
      <circle cx="295" cy="275" r="38" stroke="#ffffff" stroke-width="9" fill="none" />

      <!-- Center Starburst Sparkles inside the rings -->
      <use href="#sparkle-star" x="185" y="275" />
      <use href="#sparkle-star" x="295" y="275" />

      <!-- Sleek crossing blades -->
      <!-- Left ring to right blade tip -->
      <path d="M 185,275 L 240,220 Q 268,145 285,100 Q 255,145 240,220 Z" fill="#ffffff" />
      <!-- Right ring to left blade tip -->
      <path d="M 295,275 L 240,220 Q 212,145 195,100 Q 225,145 240,220 Z" fill="#ffffff" />

      <!-- Central Pivot Pin Screw -->
      <circle cx="240" cy="220" r="5" fill="url(#app-icon-grad)" stroke="#ffffff" stroke-width="1.8" />
    </g>
  </g>
</svg>
