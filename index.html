<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beauty Brought to You (BBTY)</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <!-- Open Graph / Facebook / WhatsApp Preview Metadata -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Beauty Brought to You (BBTY) - Mobile Beauty & Wellness Care" />
    <meta property="og:description" content="Professional mobile beauty and wellness-care service bringing salon-quality care, pampering, and dignity directly to seniors, individuals with disabilities, and care communities." />
    <meta property="og:image" content="/favicon.svg" />
    
    <!-- Twitter Preview Metadata -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Beauty Brought to You (BBTY)" />
    <meta name="twitter:description" content="Professional mobile beauty and wellness-care service bringing salon-quality care, pampering, and dignity directly to seniors, individuals with disabilities, and care communities." />
    <meta name="twitter:image" content="/favicon.svg" />

    <script>
      (function() {
        // Suppress sandboxed iframe connection anomalies and cross-origin HMR Script errors
        // to provide a smooth, error-free preview and test environment.
        window.addEventListener('error', function(event) {
          if (event.message === "Script error." || !event.filename || (event.message && (event.message.includes("websocket") || event.message.includes("HMR")))) {
            try {
              event.preventDefault();
              event.stopPropagation();
              event.stopImmediatePropagation();
            } catch(e) {}
          }
        }, true);

        window.addEventListener('unhandledrejection', function(event) {
          const reason = event.reason;
          if (reason && (reason.message === "Script error." || (reason.message && (reason.message.includes("websocket") || reason.message.includes("HMR"))))) {
            try {
              event.preventDefault();
              event.stopPropagation();
              event.stopImmediatePropagation();
            } catch(e) {}
          }
        }, true);

        // Safe Mock WebSocket to elegantly absorb HMR requests
        try {
          const originalWS = window.WebSocket;
          const MockWS = function(url, protocols) {
            this.url = url;
            this.protocols = protocols;
            this.readyState = 1; // OPEN - prevents aggressive polling/reconnection loops
            this.binaryType = 'blob';
            this._listeners = {};

            // Trigger open event asynchronously so Vite believes it successfully connected
            setTimeout(() => {
              const openEvent = { type: 'open', target: this };
              if (typeof this.onopen === 'function') {
                try { this.onopen(openEvent); } catch(e) {}
              }
              this.dispatchEvent(openEvent);
            }, 50);
          };

          MockWS.prototype.addEventListener = function(event, callback) {
            if (!this._listeners) this._listeners = {};
            if (!this._listeners[event]) this._listeners[event] = [];
            this._listeners[event].push(callback);
          };

          MockWS.prototype.removeEventListener = function(event, callback) {
            if (!this._listeners || !this._listeners[event]) return;
            this._listeners[event] = this._listeners[event].filter(cb => cb !== callback);
          };

          MockWS.prototype.dispatchEvent = function(eventObj) {
            if (!this._listeners || !this._listeners[eventObj.type]) return;
            this._listeners[eventObj.type].forEach(callback => {
              try { callback.call(this, eventObj); } catch(e) {}
            });
          };

          MockWS.prototype.send = function(data) {};
          
          MockWS.prototype.close = function(code, reason) {
            this.readyState = 3; // CLOSED
            setTimeout(() => {
              const closeEvent = { type: 'close', target: this, code: code || 1000, reason: reason || '', wasClean: true };
              if (typeof this.onclose === 'function') {
                try { this.onclose(closeEvent); } catch(e) {}
              }
              this.dispatchEvent(closeEvent);
            }, 20);
          };

          MockWS.CONNECTING = 0;
          MockWS.OPEN = 1;
          MockWS.CLOSING = 2;
          MockWS.CLOSED = 3;

          MockWS.prototype.CONNECTING = 0;
          MockWS.prototype.OPEN = 1;
          MockWS.prototype.CLOSING = 2;
          MockWS.prototype.CLOSED = 3;

          window.WebSocket = MockWS;
        } catch (e) {
          console.warn("[Sandbox] WebSocket mock bypassed:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" crossorigin src="/src/main.tsx"></script>
  </body>
</html>
